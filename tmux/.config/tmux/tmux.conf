source-file ~/.files/tmux/.config/tmux/flexoki-light.tmuxtheme

set -ga terminal-overrides ",tmux-256color*:Tc"
set-option -g default-terminal "tmux-256color"
set -s escape-time 0
set-option -g repeat-time 0

unbind C-b
set-option -g prefix C-s
bind-key C-s send-prefix

set -g history-limit 50000

bind r source-file ~/.files/tmux/.config/tmux/tmux.conf

set -g base-index 1
setw -g pane-base-index 1

#set -g status-style 'fg=green'

#set -g status-style 'fg=#879A39, bright'
#set -g status-style 'fg=#808080, bright'
set -g status-interval 1
set -g message-style reverse
set -g status-left ''

# bind -r ^ last-window
bind -r space last-window

# vim-like pane switching
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

bind -r D neww -c "#{pane_current_path}" "[[ -e diary.md ]] && nvim TODO.md || nvim ~/iCloud/diary/diary.md"
bind -r I neww -c "#{pane_current_path}" "[[ -e index.md ]] && nvim index.md || nvim ~/iCloud/index.md"

bind-key -r b movew -t1:
bind-key -r B movew -t0:

# Need to copy like in vim
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe 'pbcopy'

# mid?
set -g status-justify centre
# Just tabs
set -g status-right ""
#set -g status-position top

# nvim's checkhealth
set-option -g focus-events on

# pi
set -g extended-keys on
set -g extended-keys-format csi-u

#renumber!
set-option -g renumber-windows on

# New windows/panes keep current path
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# ── agent attention (cmux-style notifications) ──────────────────────────────
# Orange ● on a window when an agent there wants you, plus a clickable desktop
# ping (~/bin/agent-notify -> jumps you back to the pane). Claude Code drives it
# via Stop/Notification hooks (@agent_waiting); the bell covers pi/opencode/etc.
set -g monitor-bell on
set -g bell-action other
set -g visual-bell off
set-hook -g alert-bell 'run-shell -b "~/bin/agent-notify bell #{hook_pane}"'

# Append the ● keeping the flexoki theme's exact format/colours (theme lines 84-85).
setw -g window-status-format         "#[bg=#$color_bg_2,fg=#$color_tx_2] #I:#W#{?#{||:#{!=:#{@agent_waiting},},#{window_bell_flag}}, #[fg=#$color_orange]●,}"
setw -g window-status-current-format "#[bold bg=#$color_bg_2,fg=#$color_tx_2] #I:#W#{?#{||:#{!=:#{@agent_waiting},},#{window_bell_flag}}, #[fg=#$color_orange]●,}"

# Clear the ● once you actually look at the window.
set-hook -ga after-select-window 'set -uw @agent_waiting'
set-hook -ga pane-focus-in       'set -uw @agent_waiting'
